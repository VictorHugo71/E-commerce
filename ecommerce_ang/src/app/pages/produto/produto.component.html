<div *ngIf="produto" class="produto-detalhes-container">
    <button mat-icon-button class="voltar-btn" routerLink="/">
        <mat-icon>arrow_back</mat-icon> <!--Estilizar este botão-->
    </button>
    <div class="produto-detalhes-card">
      <div class="imagem-produto">
        <img [src]="produto.imagem" [alt]="produto.nome" />
      </div>
  
      <div class="info-produto">
        <h2>{{ produto.nome }}</h2>
        <p class="descricao">{{ produto.descricao }}</p>
        <h3 class="preco">{{ produto.preco | currency:'BRL':'symbol':'1.2-2' }}</h3>
  
        <div class="acoes">
          <button mat-raised-button color="primary" (click)="adicionarAoCarrinho()">
            Adicionar ao Carrinho <!--Estilizar a menssagem de adição ao carrinho-->
          </button> <!--Estilizar ambos botões-->
          <button mat-raised-button color="accent" (click)="comprarAgora()">
            Comprar Agora
          </button>
        </div>
      </div>
    </div>
  </div>
