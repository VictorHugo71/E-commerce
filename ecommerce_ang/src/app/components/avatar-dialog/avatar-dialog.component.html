<h2 class="titulo">Escolha seu Avatar</h2>

<div class="avatar-grid">
  <div
    class="avatar-option"
    *ngFor="let avatar of avatarList"
    (click)="selecionarAvatar(avatar.arquivo)"
  >
    <img
      [src]="'/avatars/' + avatar.arquivo"
      [class.selecionado]="data.avatar === avatar.arquivo"
      alt="{{ avatar.nome }}"
    />
    <p class="avatar-nome">{{ avatar.nome }}</p>
  </div>
</div>
