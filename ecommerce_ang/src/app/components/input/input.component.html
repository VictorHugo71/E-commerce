<h1>Mat-Form-Field Customize</h1>

<br><br>

<p>Mat-Form-Field Input Customize (Outline)</p>
<mat-form-field appearance="outline" class="example-full-width">
    <mat-label>Input</mat-label>
    <input matInput placeholder="Nome">
  </mat-form-field>

<h2 mat-dialog-title>Editar Perfil</h2>

<mat-dialog-content>
  <form>
    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Nome</mat-label>
      <input matInput required>
    </mat-form-field>

    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Email</mat-label>
      <input matInput required>
    </mat-form-field>

    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Telefone</mat-label>
      <input matInput>
    </mat-form-field>

    <mat-form-field appearance="fill" class="full-width">
      <mat-label>CPF</mat-label>
      <input matInput >
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button >Cancelar</button>
  <button mat-raised-button color="primary">Salvar</button>
</mat-dialog-actions>

<br><br>

<mat-checkbox class="example-margin">Check me!</mat-checkbox>
