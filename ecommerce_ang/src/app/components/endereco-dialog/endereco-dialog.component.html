<h2 mat-dialog-title>{{ data?.endereco ? 'Editar Endereço' : 'Novo Endereço' }}</h2>

<mat-dialog-content>
  <form>
    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Logradouro</mat-label>
      <input matInput [(ngModel)]="endereco.logradouro" name="logradouro" required>
    </mat-form-field>

    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Número</mat-label>
      <input matInput [(ngModel)]="endereco.numero" name="numero" required>
    </mat-form-field>

    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Complemento</mat-label>
      <input matInput [(ngModel)]="endereco.complemento" name="complemento">
    </mat-form-field>

    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Bairro</mat-label>
      <input matInput [(ngModel)]="endereco.bairro" name="bairro" required>
    </mat-form-field>

    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Cidade</mat-label>
      <input matInput [(ngModel)]="endereco.cidade" name="cidade" required>
    </mat-form-field>

    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Estado</mat-label>
      <input matInput [(ngModel)]="endereco.estado" name="estado" required>
    </mat-form-field>

    <mat-form-field appearance="fill" class="full-width">
      <mat-label>CEP</mat-label>
      <input matInput [(ngModel)]="endereco.cep" name="cep" required>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancelar()">Cancelar</button>
  <button mat-raised-button color="primary" (click)="salvar()">Salvar</button>
</mat-dialog-actions>
